<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Sugerencias y Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div id="navbarContainer"></div>

    <main class="container py-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h4 class="m-0">Sugerencias y Feedback</h4>
            <button id="btnReload" type="button" class="btn btn-outline-secondary btn-sm">Actualizar</button>
        </div>

        <!-- Form Publicar -->
        <div class="card mb-3">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-3">
                        <label class="form-label">Tipo</label>
                        <select id="tipo" class="form-select">
                            <option value="MEJORA">Mejora</option>
                            <option value="BUG">Bug</option>
                            <option value="DUDA">Duda</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Módulo</label>
                        <select id="modulo" class="form-select">
                            <option value="General">General</option>
                            <option value="Ingreso">Ingreso</option>
                            <option value="Ranking">Ranking</option>
                            <option value="Sabana">Sábana</option>
                            <option value="EstadoPedidos">Estado Pedidos</option>
                            <option value="CierreGerencia">Cierre Gerencia</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Título</label>
                        <input id="titulo" class="form-control" placeholder="Ej: Agregar filtro por cliente en Sábana">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Mensaje</label>
                        <textarea id="mensaje" class="form-control" rows="3" placeholder="Describe tu sugerencia o problema..."></textarea>
                    </div>
                    <div class="col-12 d-flex gap-2 align-items-center">
                        <button id="btnPost" type="button" class="btn btn-primary">Publicar</button>
                        <span id="msg" class="small text-muted"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed" class="d-flex flex-column gap-2"></div>
    </main>

    <script src="/js/session-ui.js"></script>
    <script src="/js/auth-header.js"></script>

    <script>
        // Navbar compartido
        fetch("/shared/navbar.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("navbarContainer").innerHTML = html;
                if (typeof paintNavbarUser === "function") paintNavbarUser();
            });

        function token() {
            return window.SpartanAuth?.getToken?.() || "";
        }


        function escapeHtml(s = "") {
            return s.replace(/[&<>"']/g, m => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
            }[m]));
        }

        function fmtDate(iso) {
            const d = new Date(iso);
            return d.toLocaleString("es-CL");
        }

        function avatarHtml(photoUrl, login) {
            if (photoUrl) {
                return `<img src="${photoUrl}" width="36" height="36" style="border-radius:50%;object-fit:cover;">`;
            }
            // fallback iniciales
            const initials = (login || "U").split(" ").slice(0, 2).map(x => x[0]?.toUpperCase() || "").join("");
            return `<div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#e9ecef;font-weight:700;">
                ${escapeHtml(initials || "U")}
              </div>`;
        }

        async function loadPosts() {
            const data = await SpartanAuth.fetchAuth(`/api/feedback/posts?skip=0&take=50`, { method: "GET" });
            if (!data) return;

            const posts = Array.isArray(data) ? data : [];
            const feed = document.getElementById("feed");

            feed.innerHTML = posts.map(p => `
        <div class="card">
          <div class="card-body">
            <div class="d-flex gap-2">
              ${avatarHtml(p.photoUrl, p.login)}
              <div class="w-100">
                <div class="fw-semibold">${escapeHtml(p.login)} <span class="badge text-bg-light">${escapeHtml(p.tipo)}</span></div>
                <div class="small text-muted">${escapeHtml(p.modulo)} • ${fmtDate(p.createdAt)}</div>
                <div class="mt-2">
                  <div class="fw-semibold">${escapeHtml(p.titulo)}</div>
                  <div>${escapeHtml(p.mensaje)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join("");
        }


        async function createPost() {
            const msg = document.getElementById("msg");
            msg.textContent = "Publicando...";

            const payload = {
                tipo: document.getElementById("tipo").value,
                modulo: document.getElementById("modulo").value,
                titulo: document.getElementById("titulo").value,
                mensaje: document.getElementById("mensaje").value
            };

            const data = await SpartanAuth.fetchAuth("/api/feedback/posts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!data) return;

            document.getElementById("titulo").value = "";
            document.getElementById("mensaje").value = "";

            msg.textContent = "Enviado a Informatica ✅";
            await loadPosts();
            setTimeout(() => msg.textContent = "", 1500);
        }



        document.getElementById("btnPost").addEventListener("click", createPost);
        document.getElementById("btnReload").addEventListener("click", loadPosts);

        // Cargar al entrar
        loadPosts();
    </script>



</body>
</html>
