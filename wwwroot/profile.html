<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <div id="navbarContainer"></div>

    <main class="container py-4">
        <h4 class="mb-3">Mi perfil</h4>

        <div class="card p-3">
            <h5 class="mb-3">Mi foto de perfil</h5>

            <div class="d-flex align-items-center gap-3 mb-3">
                <img id="profileAvatar"
                     src="/img/avatar-default.png"
                     width="96" height="96"
                     style="border-radius:50%;object-fit:cover;border:1px solid #ddd;"
                     alt="Mi foto">

                <div class="flex-grow-1">
                    <input id="photoFile" type="file" accept="image/*" class="form-control" />
                    <button id="btnUploadPhoto" type="button" class="btn btn-primary mt-2">Subir foto</button>
                    <div id="photoMsg" class="small text-muted mt-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- JS común -->
    <script src="/js/session-ui.js"></script>

    <script>
        // =========================
        // Navbar (shared)
        // =========================
        async function loadNavbar() {
            try {
                const r = await fetch("/shared/navbar.html");
                const html = await r.text();
                document.getElementById("navbarContainer").innerHTML = html;

                // pinta usuario + avatar del navbar desde cache
                if (typeof paintNavbarUser === "function") paintNavbarUser();
            } catch (e) {
                console.error("Error cargando navbar:", e);
            }
        }

        // =========================
        // API helpers
        // =========================
        function token() { return getToken ? getToken() : (localStorage.getItem("jwtToken") || localStorage.getItem("token") || ""); }

        async function fetchMyProfile() {
            const t = token();
            if (!t) return null;

            const res = await fetch("/api/users/me/profile", {
                headers: { "Authorization": `Bearer ${t}` }
            });

            if (!res.ok) return null;
            return await res.json();
        }

        // =========================
        // Pintar avatar perfil
        // =========================
        function paintProfileAvatar(url) {
            const img = document.getElementById("profileAvatar");
            if (!img) return;

            if (!url) {
                img.src = "/img/avatar-default.png";
                return;
            }
            // usa helpers de session-ui.js si existen
            const finalUrl = (typeof bustCache === "function" ? bustCache(url) : (url + (url.includes("?") ? "&" : "?") + "v=" + Date.now()));
            const resolved = (typeof resolvePhotoUrl === "function" ? resolvePhotoUrl(finalUrl) : finalUrl);

            img.src = resolved;
        }

        async function loadProfileAvatar() {
            const img = document.getElementById("profileAvatar");
            if (!img) return;

            // 1) pinta rápido desde cache POR USUARIO
            const login = (typeof getCurrentLogin === "function") ? getCurrentLogin() : (localStorage.getItem("currentLogin") || "");
            if (login && typeof getCachedPhoto === "function") {
                const cached = getCachedPhoto(login);
                if (cached) paintProfileAvatar(cached);
                else paintProfileAvatar("");
            } else {
                paintProfileAvatar("");
            }

            // 2) refresca desde API y actualiza cache POR USUARIO
            const p = await fetchMyProfile();
            if (!p) return;

            const apiLogin = (p.login || login || "").trim();
            const url = (p.photoUrl || "").trim();

            if (apiLogin && typeof setCachedPhoto === "function") {
                setCachedPhoto(apiLogin, url); // guarda por usuario
            }

            paintProfileAvatar(url);

            // repinta navbar con cache actualizado
            if (typeof paintNavbarUser === "function") paintNavbarUser();
        }

        // =========================
        // Subir foto
        // =========================
        async function uploadMyPhoto() {
            const fileInput = document.getElementById("photoFile");
            const msg = document.getElementById("photoMsg");
            const btn = document.getElementById("btnUploadPhoto");

            const file = fileInput?.files?.[0];
            if (!file) { msg.textContent = "Selecciona una imagen primero."; return; }

            const t = token();
            if (!t) { msg.textContent = "No hay sesión activa."; return; }

            btn.disabled = true;
            msg.textContent = "Subiendo foto...";

            const fd = new FormData();
            fd.append("file", file);

            try {
                const res = await fetch("/api/users/me/photo", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${t}` },
                    body: fd
                });

                if (!res.ok) {
                    const txt = await res.text().catch(() => "");
                    msg.textContent = `Error al subir: ${res.status} ${txt}`;
                    return;
                }

                const data = await res.json().catch(() => ({}));
                const url = (data.photoUrl || "").trim();

                // Determinar login del usuario actual (ideal: viene en /me/profile)
                let login = (typeof getCurrentLogin === "function") ? getCurrentLogin() : (localStorage.getItem("currentLogin") || "");
                if (!login) {
                    const p = await fetchMyProfile();
                    if (p?.login) login = p.login;
                }

                // ✅ cache por usuario
                if (login && typeof setCachedPhoto === "function") {
                    setCachedPhoto(login, url);
                }

                // pinta en perfil + navbar
                paintProfileAvatar(url);
                if (typeof paintNavbarUser === "function") paintNavbarUser();

                msg.textContent = "Foto actualizada ✅ Redirigiendo...";

                setTimeout(() => {
                    window.location.href = "ingreso.html";
                }, 900);

            } catch (e) {
                console.error(e);
                msg.textContent = "Error de red. Revisa consola.";
            } finally {
                btn.disabled = false;
            }
        }

        // =========================
        // Init
        // =========================
        document.addEventListener("DOMContentLoaded", async () => {
            await loadNavbar();
            await loadProfileAvatar();

            const btn = document.getElementById("btnUploadPhoto");
            if (btn) {
                btn.addEventListener("click", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    uploadMyPhoto();
                });
            }
        });
    </script>

</body>
</html>
