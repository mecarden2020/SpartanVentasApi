<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <header class="sp-header">

        <div class="container-fluid py-2">

            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">

                <!-- ================= LOGO + TITULO ================= -->
                <div class="d-flex align-items-center gap-3">

                    <img src="/img/spartan-logo.png"
                         alt="Spartan"
                         class="sp-logo" />

                    <div>
                        <div class="sp-title">
                            Gerencia – SPARTAN (SAP B1)
                        </div>

                        <div class="sp-subtitle">
                            Panel Gerencial Comercial y Financiero
                        </div>
                    </div>

                </div>

                <!-- ================= MENU GERENCIA ================= -->
                <div class="d-flex flex-wrap gap-2 align-items-center">

                    <!-- Ranking -->
                    <button class="btn sp-nav-btn sp-btn-ranking nav-dashboard-btn"
                            data-url="AUTO_RANKING">
                        <i class="bi bi-bar-chart-line me-1"></i>
                        Ranking
                    </button>

                    <!-- Dashboard Gerencia -->
                    <button class="btn sp-nav-btn sp-btn-gerencia nav-dashboard-btn"
                            data-url="AUTO_GERENCIA">
                        <i class="bi bi-graph-up me-1"></i>
                        Gerencia
                    </button>

                    <!-- Cierres -->
                    <button class="btn sp-nav-btn sp-btn-cierres nav-dashboard-btn"
                            data-url="AUTO_CIERRES">
                        <i class="bi bi-lock me-1"></i>
                        Cierres
                    </button>

                    <!-- Clientes Nuevos -->
                    <button class="btn sp-nav-btn sp-btn-clientes nav-dashboard-btn"
                            data-url="AUTO_CLIENTES">
                        <i class="bi bi-people me-1"></i>
                        Clientes Nuevos
                    </button>



                    <!-- Logout -->
                    <button class="btn btn-danger sp-logout-btn"
                            id="btnLogout">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Cerrar sesión
                    </button>

                </div>

            </div>

        </div>

    </header>

</body>
</html>
