<!DOCTYPE html>
<html>
<head>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- ✅ TU STYLE SPARTAN AQUÍ -->
    <style>
        .sp-header {
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .sp-logo {
            height: 42px;
            width: auto;
        }

        .sp-title {
            font-weight: 800;
            font-size: 20px;
            color: #0b2a3b;
        }

        .sp-subtitle {
            font-size: 12px;
            color: #6c757d;
        }

        .sp-nav-btn, .sp-logout-btn {
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (max-width: 576px) {
            .sp-title {
                font-size: 18px;
            }

            .sp-nav-btn, .sp-logout-btn {
                padding: 9px 12px;
            }
        }
    </style>

</head>

<body>

    <header class="sp-header border-bottom bg-white">
        <div class="container-fluid py-2 d-flex align-items-center justify-content-between gap-2 flex-wrap">

            <!-- Branding -->
            <div class="d-flex align-items-center gap-2">
                <img src="img/spartan-logo.png" alt="Spartan" class="sp-logo" />
                <div class="lh-sm">
                    <div class="sp-title">Ventas – SPARTAN (SAP B1)</div>
                    <div class="sp-subtitle">Portal Vendedor</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <button type="button" class="btn btn-success sp-nav-btn" data-url="ranking_ventas.html">
                    <i class="bi bi-bar-chart-fill me-1"></i> Ranking
                </button>

                <button type="button" class="btn btn-primary sp-nav-btn" data-url="sabana_ventas.html">
                    <i class="bi bi-table me-1"></i> Sábana
                </button>

                <button type="button" class="btn btn-outline-primary sp-nav-btn" data-url="clientes_nuevos.html">
                    <i class="bi bi-person-plus-fill me-1"></i> Clientes Nuevos
                </button>

                <button type="button" class="btn btn-outline-secondary sp-nav-btn" data-url="estado_pedidos.html">
                    <i class="bi bi-truck me-1"></i> Pedidos
                </button>

                <button type="button" class="btn btn-outline-secondary sp-nav-btn" data-url="profile.html">
                    <i class="bi bi-person-circle me-1"></i> Mi perfil
                </button>

                <button type="button" class="btn btn-danger sp-logout-btn" id="btnLogout">
                    <i class="bi bi-box-arrow-right me-1"></i> Cerrar sesión
                </button>
            </div>

        </div>
    </header>






</body>
</html>
