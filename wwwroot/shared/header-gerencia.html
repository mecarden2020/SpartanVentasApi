<!DOCTYPE html>
<html>
<head>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- ✅ TU STYLE SPARTAN AQUÍ -->
    <style>
        .sp-header {
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .sp-logo {
            height: 42px;
            width: auto;
        }

        .sp-title {
            font-weight: 800;
            font-size: 20px;
            color: #0b2a3b;
        }

        .sp-subtitle {
            font-size: 12px;
            color: #6c757d;
        }

        .sp-nav-btn, .sp-logout-btn {
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (max-width: 576px) {
            .sp-title {
                font-size: 18px;
            }

            .sp-nav-btn, .sp-logout-btn {
                padding: 9px 12px;
            }
        }
    </style>




</head>

<body>

    <header class="sp-header border-bottom bg-white">
        <div class="container-fluid py-2 d-flex align-items-center justify-content-between gap-2 flex-wrap">

            <!-- Branding -->
            <div class="d-flex align-items-center gap-2">
                <img src="img/spartan-logo.png" alt="Spartan" class="sp-logo" />
                <div class="lh-sm">
                    <div class="sp-title">Gerencia – SPARTAN (SAP B1)</div>
                    <div class="sp-subtitle">Panel Gerencial</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex align-items-center gap-2 flex-wrap">

                <!-- Ranking -->
                <button class="btn sp-nav-btn sp-btn-ranking nav-dashboard-btn"
                        data-url="AUTO_RANKING">
                    <i class="bi bi-bar-chart-line me-1"></i>
                    Ranking
                </button>

                <!-- Dashboard Gerencia -->
                <button class="btn sp-nav-btn sp-btn-gerencia nav-dashboard-btn"
                        data-url="AUTO_GERENCIA">
                    <i class="bi bi-graph-up me-1"></i>
                    Gerencia
                </button>

                <!-- Cierres -->
                <button class="btn sp-nav-btn sp-btn-cierres nav-dashboard-btn"
                        data-url="AUTO_CIERRES">
                    <i class="bi bi-lock me-1"></i>
                    Cierres
                </button>

                <!-- Clientes Nuevos -->
                <button class="btn sp-nav-btn sp-btn-clientes nav-dashboard-btn"
                        data-url="AUTO_CLIENTES">
                    <i class="bi bi-people me-1"></i>
                    Clientes Nuevos
                </button>

                <button type="button" class="btn btn-secondary nav-dashboard-btn" data-url="cumplimiento_vendedores.html">
                    Cumplimientos
                </button>


            </div>
    </header>



    <script src="/js/gerencia-nav.js"></script>

</body>
</html>
