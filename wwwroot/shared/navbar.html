<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar Spartan PRO</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <style>
        .navbar-brand {
            font-weight: 700;
            letter-spacing: .2px;
        }

        .nav-link.active-spartan {
            font-weight: 600;
            color: #00527A !important;
            border-bottom: 2px solid #00527A;
        }

        .nav-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-3">

        <!-- HOME / LOGO -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/ingreso.html">
            <img src="/img/spartan-logo.png" height="34" />
            <span>SpartanVentas</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#spartanNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="spartanNav">

            <!-- MENÚ PRINCIPAL -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="/ingreso.html" data-nav="dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/ranking_ventas.html" data-nav="ranking">Ranking</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/sabana_ventas.html" data-nav="sabana">Sábana</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/feedback.html" data-nav="sugerencias">Sugerencias</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/muro.html" data-nav="muro">Muro</a>
                </li>

            </ul>

            <!-- PERFIL USUARIO -->
            <a href="/profile.html" class="d-flex align-items-center gap-2 text-decoration-none">
                <img id="navAvatar" src="/img/avatar-default.png" class="nav-avatar" />
                <span id="navUserName" class="fw-semibold text-dark small"></span>
            </a>

        </div>

    </nav>


    <script>
        // ================================
        // PINTAR USUARIO NAVBAR
        // ================================
        (function paintNavbarUser() {

            const alias = localStorage.getItem("currentAlias") || "";
            const login = localStorage.getItem("currentLogin") || "";
            const role = localStorage.getItem("currentRole") || "";

            const label = alias || login || "Usuario";

            const nameEl = document.getElementById("navUserName");
            if (nameEl) {
                nameEl.textContent = role ? `${label} · ${role}` : label;
            }

            const avatar = localStorage.getItem("currentPhotoUrl");
            if (avatar) {
                const img = document.getElementById("navAvatar");
                if (img) img.src = avatar;
            }

        })();


        // ================================
        // MENU ACTIVO AUTOMÁTICO
        // ================================
        (function setActiveMenu() {

            const path = window.location.pathname.toLowerCase();

            document.querySelectorAll(".nav-link[data-nav]").forEach(link => {

                const href = link.getAttribute("href").toLowerCase();

                if (path.includes(href.replace("/", ""))) {
                    link.classList.add("active-spartan");
                }

                if (path === "/" && link.dataset.nav === "dashboard") {
                    link.classList.add("active-spartan");
                }

            });

        })();
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
