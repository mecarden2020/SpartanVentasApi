<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Muro interno – SpartanVentas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>

    <!-- Navbar -->
    <div id="navbarContainer"></div>

    <main class="container py-4" style="max-width: 980px;">

        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h4 class="mb-0">Muro interno</h4>
            <div class="small text-muted">
                Visible para toda la organización (requiere sesión)
            </div>
        </div>

        <!-- =========================
        Crear Post
    ========================== -->

        <div class="card mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Categoría</label>
                        <select id="cat" class="form-select">
                            <option value="SUGERENCIA">Sugerencia</option>
                            <option value="PROBLEMA">Problema</option>
                            <option value="RECONOCIMIENTO">Reconocimiento</option>
                            <option value="IDEA">Idea</option>
                            <option value="OTRO">Otro</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Publicación</label>
                        <textarea id="txt" class="form-control" rows="2" placeholder="Escribe un mensaje para el muro..."></textarea>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Imagen (opcional)</label>
                        <input id="postImage" type="file" accept="image/*" class="form-control" />
                        <div class="form-text">JPG/PNG (máx 4MB)</div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-2">
                    <button id="btnPublicar" type="button" class="btn btn-primary">Publicar</button>
                    <div id="msg" class="small text-muted align-self-center"></div>
                </div>
            </div>
        </div>
        <!--
   

                <!-- =========================
                 Feed
                ========================== -->
        <div id="feed"></div>

                <!-- =========================
                    Paginación
                ========================== -->
        <div class="d-flex justify-content-between align-items-center mt-3">
            <button id="btnPrev" class="btn btn-outline-secondary btn-sm">
                ← Anterior
            </button>
            <div class="small text-muted" id="pageInfo">—</div>
            <button id="btnNext" class="btn btn-outline-secondary btn-sm">
                Siguiente →
            </button>
        </div>

    </main>

    <!-- Scripts -->
    <script src="/js/session-ui.js"></script>
    <script src="/js/auth-header.js"></script>
    <script src="/js/muro.js"></script>

    <!-- Navbar loader -->
    <script>
        fetch("/shared/navbar.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("navbarContainer").innerHTML = html;
                if (typeof paintNavbarUser === "function") {
                    paintNavbarUser();
                }
            });
    </script>

</body>
</html>
