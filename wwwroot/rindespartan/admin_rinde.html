<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin RindeSpartan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/rindespartan.css" rel="stylesheet">
</head>

<body>

    <header class="rinde-header d-flex align-items-center px-4">
        <img src="/img/spartan-logo.png" alt="Spartan" class="logo-spartan">

        <div class="ms-3">
            <h1 class="titulo-modulo">RindeSpartan</h1>
            <div class="subtitulo-modulo">Administración de Usuarios y Topes</div>
        </div>

        <div class="ms-auto usuario-box">
            <span id="nombreUsuario">Usuario</span>
        </div>
    </header>

    <main class="container-fluid mt-4">

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-outline-secondary" onclick="location.href='index.html'">
                ← Volver al inicio
            </button>
        </div>

        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <div class="card card-rinde shadow-sm">
                    <div class="card-body">
                        <div class="card-titulo">Usuarios configurados</div>
                        <div class="saldo-monto" id="totalUsuarios">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-rinde shadow-sm">
                    <div class="card-body">
                        <div class="card-titulo">Pueden rendir</div>
                        <div class="saldo-monto text-success" id="totalActivos">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-rinde shadow-sm">
                    <div class="card-body">
                        <div class="card-titulo">Tope mensual total</div>
                        <div class="saldo-monto text-warning" id="topeTotal">$0</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="card card-rinde shadow-sm">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Configuración de Usuarios</h4>

                    <input type="text"
                           class="form-control buscador-rinde"
                           id="txtBuscarAdmin"
                           placeholder="Buscar usuario...">
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="tabla-rinde-head">
                            <tr>
                                <th>Usuario</th>
                                <th>Tipo</th>
                                <th>Puede Rendir</th>
                                <th>Tope Mensual</th>
                                <th>Centro Costo</th>
                                <th>Aprobador</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>

                        <tbody id="tbodyUsuariosRinde"></tbody>
                    </table>
                </div>

            </div>
        </div>

    </main>

    <footer class="footer-rinde text-center mt-5">
        Powered by MCF-2025
    </footer>

    <!-- MODAL CONFIGURACIÓN -->
    <div class="modal fade" id="modalConfigUsuario" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header modal-rinde-header">
                    <h5 class="modal-title">Configurar Usuario RindeSpartan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form id="formConfigUsuario">

                        <input type="hidden" id="configUsuarioId">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="configNombreUsuario" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo de usuario</label>
                                <select class="form-select" id="configTipoUsuario">
                                    <option value="VENDEDOR">Vendedor</option>
                                    <option value="ADMINISTRATIVO">Administrativo</option>
                                    <option value="CONTABILIDAD">Contabilidad</option>
                                    <option value="APROBADOR">Aprobador</option>
                                    <option value="GERENCIA">Gerencia</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Puede rendir gastos</label>
                                <select class="form-select" id="configPuedeRendir">
                                    <option value="1">Sí</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Tope mensual</label>
                                <input type="number" class="form-control" id="configTopeMensual" min="0" step="1000">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Centro de costo</label>
                                <select class="form-select" id="configCentroCosto">
                                    <option value="">Sin asignar</option>
                                    <option value="10">10 - Industrial</option>
                                    <option value="30">30 - Health Care</option>
                                    <option value="40">40 - Food & Beverages</option>
                                    <option value="50">50 - Institucional</option>
                                    <option value="ADM">ADM - Administración</option>
                                    <option value="GG">GG - Gerencia General</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Aprobador asignado</label>
                                <select class="form-select" id="configAprobador">
                                    <option value="">Sin aprobador</option>
                                    <option value="101">Carlos Aprobador</option>
                                    <option value="102">María Supervisora</option>
                                    <option value="103">Contabilidad</option>
                                    <option value="104">Gerencia General</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Estado configuración</label>
                                <select class="form-select" id="configActivo">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Observación interna</label>
                                <textarea class="form-control" id="configObservacion" rows="3"
                                          placeholder="Observación administrativa opcional"></textarea>
                            </div>

                        </div>

                        <div id="mensajeAdmin" class="alert mt-3 d-none"></div>

                    </form>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button class="btn btn-warning" id="btnGuardarConfig">
                        Guardar Configuración
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/rinde-core.js"></script>
    <script src="js/rinde-admin.js"></script>

</body>
</html>
