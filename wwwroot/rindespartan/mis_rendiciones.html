<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Rendiciones - RindeSpartan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/rindespartan.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="rinde-header d-flex align-items-center px-4">

        <img src="/img/spartan-logo.png"
             alt="Spartan"
             class="logo-spartan">

        <div class="ms-3">
            <h1 class="titulo-modulo">RindeSpartan</h1>
            <div class="subtitulo-modulo">
                Mis Rendiciones
            </div>
        </div>

        <div class="ms-auto usuario-box">
            <span id="nombreUsuario">Usuario</span>
        </div>

    </header>

    <!-- CONTENIDO -->
    <main class="container-fluid mt-4">

        <!-- BOTONES -->
        <div class="d-flex gap-2 mb-4">

            <button class="btn btn-outline-secondary"
                    onclick="location.href='index.html'">
                ← Volver al inicio
            </button>

            <button class="btn btn-warning"
                    onclick="location.href='nueva_rendicion.html'">
                + Nueva Rendición
            </button>

        </div>

        <!-- RESUMEN -->
        <div class="row g-3 mb-4">

            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Total Rendido
                        </div>

                        <div class="saldo-monto" id="totalRendido">
                            $0
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Pendiente Aprobación
                        </div>

                        <div class="saldo-monto text-warning" id="pendienteAprobacion">
                            $0
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Aprobado
                        </div>

                        <div class="saldo-monto text-success" id="totalAprobado">
                            $0
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- TABLA -->
        <div class="card card-rinde shadow-sm">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4 class="mb-0">
                        Historial de Rendiciones
                    </h4>

                    <input type="text"
                           class="form-control buscador-rinde"
                           id="txtBuscar"
                           placeholder="Buscar...">

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="tabla-rinde-head">

                            <tr>
                                <th>Folio</th>
                                <th>Fecha</th>
                                <th>Documento</th>
                                <th>Proveedor</th>
                                <th>Tipo Gasto</th>
                                <th>Monto</th>
                                <th>Estado</th>
                                <th>Observación</th>
                                <th>Acción</th>
                            </tr>

                        </thead>

                        <tbody id="tbodyRendiciones">
                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer-rinde text-center mt-5">
        Powered by MCF-2025
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/rinde-core.js"></script>
    <script src="js/rinde-mis.js"></script>

</body>
</html>
