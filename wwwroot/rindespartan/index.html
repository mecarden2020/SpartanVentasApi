<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RindeSpartan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link href="css/rindespartan.css" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <header class="rinde-header d-flex align-items-center px-4">

        <img src="/img/spartan-logo.png"
             alt="Spartan"
             class="logo-spartan">

        <div class="ms-3">
            <h1 class="titulo-modulo">RindeSpartan</h1>
            <div class="subtitulo-modulo">
                Plataforma de Rendición de Gastos
            </div>
        </div>

        <div class="ms-auto usuario-box">
            <span id="nombreUsuario">Usuario</span>
        </div>

    </header>

    <!-- CONTENIDO -->
    <main class="container-fluid mt-4">

        <div class="row g-4">

            <!-- TARJETA SALDO -->
            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Saldo Disponible
                        </div>

                        <div class="saldo-monto" id="saldoDisponible">
                            $0
                        </div>

                    </div>

                </div>

            </div>

            <!-- TARJETA UTILIZADO -->
            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Gastos Utilizados
                        </div>

                        <div class="saldo-monto text-danger" id="gastoUtilizado">
                            $0
                        </div>

                    </div>

                </div>

            </div>

            <!-- TARJETA PENDIENTES -->
            <div class="col-md-4">

                <div class="card card-rinde shadow-sm">

                    <div class="card-body">

                        <div class="card-titulo">
                            Rendiciones Pendientes
                        </div>

                        <div class="saldo-monto text-warning" id="pendientes">
                            0
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- ACCIONES -->
        <div class="mt-5">

            <div class="d-flex gap-3 flex-wrap">

                <button class="btn btn-warning btn-lg" onclick="location.href='nueva_rendicion.html'">
                    Nueva Rendición
                </button>

                <button class="btn btn-outline-dark btn-lg" onclick="location.href='mis_rendiciones.html'">
                    Mis Rendiciones
                </button>

                <button class="btn btn-outline-secondary btn-lg" onclick="location.href='aprobaciones.html'">
                    Aprobaciones
                </button>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer-rinde text-center mt-5">
        Powered by MCF-2025
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="js/rinde-core.js"></script>

</body>
</html>
