<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Rendición - RindeSpartan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/rindespartan.css" rel="stylesheet">
</head>

<body>

    <header class="rinde-header d-flex align-items-center px-4">
        <img src="/img/spartan-logo.png" alt="Spartan" class="logo-spartan">

        <div class="ms-3">
            <h1 class="titulo-modulo">RindeSpartan</h1>
            <div class="subtitulo-modulo">Nueva Rendición de Gastos</div>
        </div>

        <div class="ms-auto usuario-box">
            <span id="nombreUsuario">Usuario</span>
        </div>
    </header>

    <main class="container mt-4">

        <div class="mb-3">
            <button class="btn btn-outline-secondary" onclick="location.href='index.html'">
                ← Volver al inicio
            </button>
        </div>

        <div class="card card-rinde shadow-sm">
            <div class="card-body">

                <h4 class="mb-4">Registrar nueva rendición</h4>

                <form id="formNuevaRendicion">

                    <div class="row g-3 mb-4">

                        <div class="col-md-4">
                            <label class="form-label">Tipo de gasto</label>
                            <select class="form-select" id="tipoGasto" required>
                                <option value="">Seleccione...</option>
                                <option value="COMBUSTIBLE">Combustible</option>
                                <option value="ALIMENTACION">Alimentación</option>
                                <option value="ALOJAMIENTO">Alojamiento</option>
                                <option value="ESTACIONAMIENTO">Estacionamiento</option>
                                <option value="PEAJE">Peaje</option>
                                <option value="MOVILIZACION">Movilización</option>
                                <option value="OTRO">Otro</option>
                            </select>
                        </div>

                        <div class="col-md-8">
                            <label class="form-label">Justificación general</label>
                            <input type="text" class="form-control" id="justificacion"
                                   placeholder="Ej: Visita a cliente, terreno, traslado, reunión, etc." required>
                        </div>

                    </div>

                    <hr>

                    <h5 class="mb-3">Documentos de respaldo</h5>

                    <div class="row g-3 align-items-end">

                        <div class="col-md-3">
                            <label class="form-label">Tipo documento</label>
                            <select class="form-select" id="docTipoDocumento">
                                <option value="">Seleccione...</option>
                                <option value="BOLETA">Boleta</option>
                                <option value="FACTURA">Factura</option>
                                <option value="COMPROBANTE">Comprobante</option>
                                <option value="OTRO">Otro</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Fecha documento</label>
                            <input type="date" class="form-control" id="docFechaDocumento">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">N° documento</label>
                            <input type="text" class="form-control" id="docNumeroDocumento" placeholder="Opcional">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Proveedor</label>
                            <input type="text" class="form-control" id="docProveedor" placeholder="Ej: Copec">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Monto</label>
                            <input type="number" class="form-control" id="docMonto" min="1" step="1" placeholder="0">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Archivo</label>
                            <input type="file" class="form-control" id="docArchivo" accept=".pdf,.jpg,.jpeg,.png">
                        </div>

                        <div class="col-md-3">
                            <button type="button" class="btn btn-outline-dark w-100" id="btnAgregarDocumento">
                                + Agregar documento
                            </button>
                        </div>

                    </div>

                    <div class="table-responsive mt-4">
                        <table class="table table-hover align-middle">
                            <thead class="tabla-rinde-head">
                                <tr>
                                    <th>Tipo</th>
                                    <th>Fecha</th>
                                    <th>N° Doc</th>
                                    <th>Proveedor</th>
                                    <th>Monto</th>
                                    <th>Archivo</th>
                                    <th>Quitar</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyDocumentos">
                                <tr>
                                    <td colspan="7" class="text-center text-muted py-3">
                                        No hay documentos agregados.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="text-end mt-3">
                        <div class="card-titulo">Total rendición</div>
                        <div class="saldo-monto" id="totalRendicion">$0</div>
                    </div>

                    <div id="mensajeValidacion" class="alert mt-4 d-none"></div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning btn-lg">
                            Guardar Rendición
                        </button>

                        <button type="button" class="btn btn-outline-secondary btn-lg" onclick="location.href='index.html'">
                            Cancelar
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </main>

    <footer class="footer-rinde text-center mt-5">
        Powered by MCF-2025
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/rinde-core.js"></script>
    <script src="js/rinde-nueva.js"></script>

</body>
</html>
